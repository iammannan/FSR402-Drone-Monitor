<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Force Sensor Monitor</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Arial,sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column}
  header{background:#1a1d27;border-bottom:1px solid #2d3148;padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
  header h1{font-size:1.15rem;font-weight:600;letter-spacing:.5px;color:#c7d2fe}
  #status{display:flex;align-items:center;gap:8px;font-size:.8rem}
  #dot{width:10px;height:10px;border-radius:50%;background:#ef4444;transition:background .3s}
  #dot.ok{background:#22c55e}
  #statusTxt{color:#94a3b8}

  .toolbar{background:#1a1d27;padding:10px 20px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;border-bottom:1px solid #2d3148}
  button{padding:8px 18px;border:none;border-radius:6px;font-size:.82rem;font-weight:600;cursor:pointer;transition:opacity .15s}
  button:active{opacity:.75}
  button:disabled{opacity:.4;cursor:default}
  #btnTare   {background:#4f46e5;color:#fff}
  #btnStart  {background:#16a34a;color:#fff}
  #btnStop   {background:#dc2626;color:#fff}
  #btnDl     {background:#0284c7;color:#fff}
  #btnSettings{background:#334155;color:#fff}
  #recInfo{margin-left:auto;font-size:.78rem;color:#94a3b8}

  .infobar{background:#12151f;padding:6px 20px;display:flex;gap:16px;align-items:center;border-bottom:1px solid #2d3148;font-size:.75rem;color:#475569}

  .chart-wrap{flex:1;padding:16px 20px 8px;display:flex;flex-direction:column;gap:8px;min-height:0}
  canvas{width:100%!important;border-radius:8px;background:#1a1d27}

  .legend{display:flex;flex-wrap:wrap;gap:6px 14px;padding:0 20px 6px}
  .leg{display:flex;align-items:center;gap:5px;font-size:.75rem}
  .leg-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}

  .values{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px 20px 14px}
  .vcard{background:#1a1d27;border:1px solid #2d3148;border-radius:8px;padding:8px 12px;text-align:center}
  .vcard .label{font-size:.68rem;color:#94a3b8;margin-bottom:2px}
  .vcard .val{font-size:1.25rem;font-weight:700;font-variant-numeric:tabular-nums;color:#c7d2fe}
  .vcard .unit{font-size:.65rem;color:#64748b;margin-top:1px}
  @media(max-width:500px){.values{grid-template-columns:repeat(2,1fr)}}

  /* ── Settings overlay ─────────────────────────────────────────── */
  #settingsOverlay{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);
    z-index:100;align-items:center;justify-content:center;
  }
  #settingsOverlay.open{display:flex}
  #settingsPanel{
    background:#1a1d27;border:1px solid #2d3148;border-radius:12px;
    width:min(520px,95vw);max-height:90vh;overflow-y:auto;
    padding:24px;display:flex;flex-direction:column;gap:16px;
  }
  #settingsPanel h2{font-size:1rem;font-weight:700;color:#c7d2fe;margin-bottom:4px}
  .set-section{border:1px solid #2d3148;border-radius:8px;padding:14px;display:flex;flex-direction:column;gap:10px}
  .set-section h3{font-size:.78rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px}
  .set-row{display:grid;grid-template-columns:90px 1fr 110px;gap:8px;align-items:center;font-size:.82rem}
  .set-row span{color:#94a3b8}
  .set-row input{
    padding:5px 8px;background:#0f1117;border:1px solid #2d3148;
    border-radius:5px;color:#e2e8f0;font-size:.82rem;width:100%;
  }
  .set-row input:focus{outline:none;border-color:#4f46e5}
  .raw-val{font-size:.75rem;color:#475569;font-variant-numeric:tabular-nums}
  .set-global{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .set-global label{display:flex;flex-direction:column;gap:4px;font-size:.82rem;color:#94a3b8}
  .set-global input{
    padding:6px 8px;background:#0f1117;border:1px solid #2d3148;
    border-radius:5px;color:#e2e8f0;font-size:.85rem;
  }
  .set-global input:focus{outline:none;border-color:#4f46e5}
  .set-btns{display:flex;gap:10px;justify-content:flex-end}
  #btnSetSave{background:#4f46e5;color:#fff}
  #btnSetClose{background:#334155;color:#fff}
</style>
</head>
<body>

<header>
  <h1>&#9889; Force Sensor Monitor</h1>
  <div id="status">
    <div id="dot"></div>
    <span id="statusTxt">Connecting…</span>
  </div>
</header>

<div class="toolbar">
  <button id="btnTare">&#8856; Tare All</button>
  <button id="btnStart">&#9654; Start Recording</button>
  <button id="btnStop" disabled>&#9646;&#9646; Stop Recording</button>
  <button id="btnDl" disabled>&#8659; Download XLSX</button>
  <button id="btnSettings">&#9881; Settings</button>
  <span id="recInfo"></span>
</div>

<div class="infobar">
  <span id="rawDisp">S1 raw ADC: –</span>
  <span id="rateDisp">Rate: –</span>
</div>

<div class="chart-wrap">
  <canvas id="chart" height="300"></canvas>
</div>

<div class="legend" id="legend"></div>
<div class="values" id="values"></div>

<!-- ── Settings panel ──────────────────────────────────────────── -->
<div id="settingsOverlay">
  <div id="settingsPanel">
    <h2>&#9881; Sensor Settings</h2>

    <div class="set-section">
      <h3>Global</h3>
      <div class="set-global">
        <label>Max Display (kg)
          <input id="cfgMaxKg" type="number" value="10" min="0.1" step="0.1">
        </label>
        <label>Pull-down Resistor (Ω)
          <input id="cfgRpull" type="number" value="10000" min="1" step="100">
        </label>
      </div>
    </div>

    <div class="set-section">
      <h3>Per-Sensor Cal Factor &amp; Live ADC</h3>
      <div class="set-row" style="font-weight:600;color:#64748b;font-size:.72rem">
        <span>Sensor</span><span>Cal Factor</span><span>Live ADC (raw)</span>
      </div>
      <div id="sensorRows"></div>
    </div>

    <p style="font-size:.75rem;color:#475569">
      Place a known weight → adjust Cal Factor until display matches.<br>
      Formula: kg = CalFactor × raw / (Rpull × (4095 − raw)) ÷ 1000
    </p>

    <div class="set-btns">
      <button id="btnSetClose">Cancel</button>
      <button id="btnSetSave">&#10003; Save</button>
    </div>
  </div>
</div>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
const N_SENSORS   = 8;
const HISTORY_PTS = 400;
const ADC_MAX     = 4095;
const COLORS = [
  '#818cf8','#34d399','#fb923c','#f472b6',
  '#38bdf8','#facc15','#a78bfa','#4ade80'
];
const LABELS = Array.from({length:N_SENSORS}, (_,i)=>`Sensor ${i+1}`);

// ── Persistent config (localStorage) ────────────────────────────────────────
const DEFAULT_CAL    = 1e9;
const DEFAULT_MAX_KG = 10;
const DEFAULT_RPULL  = 10000;

function loadCfg() {
  try { return JSON.parse(localStorage.getItem('fsr_cfg')) || {}; } catch{ return {}; }
}
function saveCfg(cfg) { localStorage.setItem('fsr_cfg', JSON.stringify(cfg)); }

let cfg = loadCfg();
if (!cfg.calFactors) cfg.calFactors = Array(N_SENSORS).fill(DEFAULT_CAL);
if (cfg.maxKg  == null) cfg.maxKg  = DEFAULT_MAX_KG;
if (cfg.rPull  == null) cfg.rPull  = DEFAULT_RPULL;

// ── Conversion ───────────────────────────────────────────────────────────────
function toKg(raw, sensorIdx) {
  if (raw <= 0) return 0;
  if (raw >= ADC_MAX) return cfg.maxKg;
  const conductance = raw / (cfg.rPull * (ADC_MAX - raw));
  const kg = cfg.calFactors[sensorIdx] * conductance / 1000;
  return Math.min(Math.max(0, kg), cfg.maxKg);
}

// ── State ────────────────────────────────────────────────────────────────────
let buf     = Array.from({length:N_SENSORS}, ()=>[]);
let latest  = new Array(N_SENSORS).fill(0);
let latestRaw = new Array(N_SENSORS).fill(0);
let recording = false, recData = [], recStart = 0;
let pktCount = 0, lastRateTs = 0, sampleRate = 0;

// ── Build main DOM ───────────────────────────────────────────────────────────
const legendEl = document.getElementById('legend');
const valuesEl = document.getElementById('values');
LABELS.forEach((lbl,i)=>{
  legendEl.insertAdjacentHTML('beforeend',
    `<div class="leg"><div class="leg-dot" style="background:${COLORS[i]}"></div>${lbl}</div>`);
  valuesEl.insertAdjacentHTML('beforeend',
    `<div class="vcard"><div class="label">${lbl}</div><div class="val" id="v${i}">–</div><div class="unit">kg</div></div>`);
});

// ── Build settings sensor rows ───────────────────────────────────────────────
const sensorRowsEl = document.getElementById('sensorRows');
LABELS.forEach((lbl,i)=>{
  sensorRowsEl.insertAdjacentHTML('beforeend',
    `<div class="set-row">
       <span style="color:${COLORS[i]}">${lbl}</span>
       <input id="scf${i}" type="number" value="${cfg.calFactors[i]}" min="1" step="1000000">
       <span class="raw-val" id="sraw${i}">–</span>
     </div>`);
});

// populate global fields
document.getElementById('cfgMaxKg').value = cfg.maxKg;
document.getElementById('cfgRpull').value = cfg.rPull;

// ── Canvas chart ─────────────────────────────────────────────────────────────
const canvas = document.getElementById('chart');
const ctx    = canvas.getContext('2d');

function resizeCanvas(){
  const r = canvas.parentElement.getBoundingClientRect();
  canvas.width  = r.width  * devicePixelRatio;
  canvas.height = 300      * devicePixelRatio;
  canvas.style.height = '300px';
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function drawChart(){
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#1a1d27'; ctx.fillRect(0,0,W,H);

  let yMin=0, yMax=cfg.maxKg;
  const PL=54, PR=12, PT=12, PB=28;
  const gW=W-PL-PR, gH=H-PT-PB;
  const GRID_Y=5;

  ctx.strokeStyle='#2d3148'; ctx.lineWidth=1;
  ctx.fillStyle='#475569';
  ctx.font=`${11*devicePixelRatio}px monospace`;
  ctx.textAlign='right'; ctx.textBaseline='middle';
  for(let g=0;g<=GRID_Y;g++){
    const y=PT+gH*(1-g/GRID_Y);
    ctx.beginPath(); ctx.moveTo(PL,y); ctx.lineTo(PL+gW,y); ctx.stroke();
    ctx.fillText((yMin+(yMax-yMin)*(g/GRID_Y)).toFixed(2), PL-4, y);
  }

  for(let s=0;s<N_SENSORS;s++){
    const pts=buf[s];
    if(pts.length<2) continue;
    ctx.beginPath();
    ctx.strokeStyle=COLORS[s];
    ctx.lineWidth=1.5*devicePixelRatio;
    ctx.lineJoin='round';
    for(let i=0;i<pts.length;i++){
      const x=PL+gW*(i/(HISTORY_PTS-1));
      const y=PT+gH*(1-(pts[i]-yMin)/(yMax-yMin));
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.stroke();
  }
}

function tick(){ drawChart(); requestAnimationFrame(tick); }
requestAnimationFrame(tick);

// ── WebSocket ────────────────────────────────────────────────────────────────
const dot=document.getElementById('dot'), statusTxt=document.getElementById('statusTxt');
let ws, reconnTimer;

function connect(){
  ws = new WebSocket(`ws://${location.hostname}/ws`);
  ws.onopen=()=>{ dot.className='ok'; statusTxt.textContent='Connected'; clearTimeout(reconnTimer); };
  ws.onclose=ws.onerror=()=>{ dot.className=''; statusTxt.textContent='Disconnected – retrying…'; reconnTimer=setTimeout(connect,2000); };
  ws.onmessage=({data})=>{
    let msg; try{ msg=JSON.parse(data); }catch{ return; }
    if(msg.tared){ flashTare(); return; }
    if(!Array.isArray(msg.b)) return;

    // track sample rate
    pktCount++;
    const now=Date.now();
    if(now-lastRateTs>=1000){
      sampleRate = Math.round(msg.b.length * pktCount * 1000/(now-lastRateTs));
      document.getElementById('rateDisp').textContent=`Rate: ~${sampleRate} sps`;
      pktCount=0; lastRateTs=now;
    }

    for(const row of msg.b){
      const ts=row[0];
      const vals=[];
      for(let s=0;s<N_SENSORS;s++){
        latestRaw[s]=row[s+1];
        vals.push(toKg(row[s+1], s));
      }
      for(let s=0;s<N_SENSORS;s++){
        buf[s].push(vals[s]);
        if(buf[s].length>HISTORY_PTS) buf[s].shift();
      }
      latest=vals;
      if(recording){
        if(recStart===0) recStart=ts;
        recData.push({ts, elapsed:ts-recStart, vals:[...vals]});
      }
    }

    for(let s=0;s<N_SENSORS;s++)
      document.getElementById(`v${s}`).textContent=latest[s].toFixed(3);

    document.getElementById('rawDisp').textContent=`S1 raw ADC: ${latestRaw[0]}`;

    // update live ADC in settings panel if open
    for(let s=0;s<N_SENSORS;s++){
      const el=document.getElementById(`sraw${s}`);
      if(el) el.textContent=latestRaw[s];
    }

    if(recording)
      document.getElementById('recInfo').textContent=`Recording… ${recData.length} samples`;
  };
}
connect();

// ── Tare ─────────────────────────────────────────────────────────────────────
function flashTare(){
  const b=document.getElementById('btnTare');
  b.textContent='✓ Tared!';
  setTimeout(()=>{ b.textContent='⊘ Tare All'; },1200);
}
document.getElementById('btnTare').onclick=()=>{ if(ws&&ws.readyState===WebSocket.OPEN) ws.send('tare'); };

// ── Record / Download ────────────────────────────────────────────────────────
document.getElementById('btnStart').onclick=()=>{
  recData=[]; recStart=0; recording=true;
  document.getElementById('btnStart').disabled=true;
  document.getElementById('btnStop').disabled=false;
  document.getElementById('btnDl').disabled=true;
  document.getElementById('recInfo').textContent='Recording… 0 samples';
};
document.getElementById('btnStop').onclick=()=>{
  recording=false;
  document.getElementById('btnStop').disabled=true;
  document.getElementById('btnStart').disabled=false;
  document.getElementById('btnDl').disabled=recData.length===0;
  document.getElementById('recInfo').textContent=`Stopped. ${recData.length} samples ready.`;
};
document.getElementById('btnDl').onclick=()=>{
  if(!recData.length) return;
  const headers=['Timestamp (ms)','Elapsed (ms)',...LABELS.map(l=>`${l} (kg)`)];
  const rows=recData.map(r=>[r.ts,r.elapsed,...r.vals]);
  const xl=buildXLSX(headers,rows);
  const blob=new Blob([xl],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  const now=new Date();
  const stamp=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_`+
              `${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
  a.download=`ForceSensor_${stamp}.xlsx`; a.click(); URL.revokeObjectURL(a.href);
};

// ── Settings panel ───────────────────────────────────────────────────────────
document.getElementById('btnSettings').onclick=()=>{
  // refresh inputs from current cfg before opening
  document.getElementById('cfgMaxKg').value=cfg.maxKg;
  document.getElementById('cfgRpull').value=cfg.rPull;
  for(let i=0;i<N_SENSORS;i++)
    document.getElementById(`scf${i}`).value=cfg.calFactors[i];
  document.getElementById('settingsOverlay').classList.add('open');
};
document.getElementById('btnSetClose').onclick=()=>{
  document.getElementById('settingsOverlay').classList.remove('open');
};
document.getElementById('settingsOverlay').onclick=(e)=>{
  if(e.target===document.getElementById('settingsOverlay'))
    document.getElementById('settingsOverlay').classList.remove('open');
};
document.getElementById('btnSetSave').onclick=()=>{
  cfg.maxKg = parseFloat(document.getElementById('cfgMaxKg').value) || DEFAULT_MAX_KG;
  cfg.rPull = parseFloat(document.getElementById('cfgRpull').value) || DEFAULT_RPULL;
  for(let i=0;i<N_SENSORS;i++)
    cfg.calFactors[i] = parseFloat(document.getElementById(`scf${i}`).value) || DEFAULT_CAL;
  saveCfg(cfg);
  document.getElementById('settingsOverlay').classList.remove('open');
};

// ── Minimal XLSX generator ───────────────────────────────────────────────────
function buildXLSX(headers,rows){
  function colLetter(c){let s='';do{s=String.fromCharCode(65+(c%26))+s;c=Math.floor(c/26)-1;}while(c>=0);return s;}
  function cellRef(r,c){return colLetter(c)+(r+1);}
  function esc(v){return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  let sheetRows='';
  sheetRows+=`<row r="1">`;
  headers.forEach((h,c)=>{sheetRows+=`<c r="${cellRef(0,c)}" t="inlineStr"><is><t>${esc(h)}</t></is></c>`;});
  sheetRows+=`</row>`;
  rows.forEach((row,r)=>{
    sheetRows+=`<row r="${r+2}">`;
    row.forEach((v,c)=>{
      if(typeof v==='number') sheetRows+=`<c r="${cellRef(r+1,c)}"><v>${v}</v></c>`;
      else sheetRows+=`<c r="${cellRef(r+1,c)}" t="inlineStr"><is><t>${esc(v)}</t></is></c>`;
    });
    sheetRows+=`</row>`;
  });
  const files={
    '[Content_Types].xml':`<?xml version="1.0" encoding="UTF-8"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/><Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/></Types>`,
    '_rels/.rels':`<?xml version="1.0" encoding="UTF-8"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>`,
    'xl/workbook.xml':`<?xml version="1.0" encoding="UTF-8"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets><sheet name="SensorData" sheetId="1" r:id="rId1"/></sheets></workbook>`,
    'xl/_rels/workbook.xml.rels':`<?xml version="1.0" encoding="UTF-8"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/><Relationship Id="rId2" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/></Relationships>`,
    'xl/worksheets/sheet1.xml':`<?xml version="1.0" encoding="UTF-8"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>${sheetRows}</sheetData></worksheet>`,
    'xl/styles.xml':`<?xml version="1.0" encoding="UTF-8"?><styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><fonts count="1"><font><sz val="11"/><name val="Calibri"/></font></fonts><fills count="2"><fill><patternFill patternType="none"/></fill><fill><patternFill patternType="gray125"/></fill></fills><borders count="1"><border><left/><right/><top/><bottom/><diagonal/></border></borders><cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs><cellXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/></cellXfs></styleSheet>`
  };
  return packZip(files);
}

function crc32(data){
  if(!crc32._t){crc32._t=new Uint32Array(256);for(let i=0;i<256;i++){let c=i;for(let j=0;j<8;j++)c=(c&1)?0xEDB88320^(c>>>1):(c>>>1);crc32._t[i]=c;}}
  let c=0xFFFFFFFF; for(const b of data)c=crc32._t[(c^b)&0xFF]^(c>>>8); return(c^0xFFFFFFFF)>>>0;
}
function packZip(files){
  const enc=new TextEncoder(),entries=[];let offset=0;
  for(const[name,content]of Object.entries(files)){
    const nameB=enc.encode(name),dataB=enc.encode(content),crc=crc32(dataB);
    const lh=new Uint8Array(30+nameB.length),dv=new DataView(lh.buffer);
    dv.setUint32(0,0x04034b50,true);dv.setUint16(4,20,true);dv.setUint16(6,0,true);
    dv.setUint16(8,0,true);dv.setUint16(10,0,true);dv.setUint16(12,0,true);
    dv.setUint32(14,crc,true);dv.setUint32(18,dataB.length,true);dv.setUint32(22,dataB.length,true);
    dv.setUint16(26,nameB.length,true);dv.setUint16(28,0,true);lh.set(nameB,30);
    entries.push({nameB,dataB,crc,offset,lh});offset+=lh.length+dataB.length;
  }
  const cdParts=entries.map(e=>{
    const cd=new Uint8Array(46+e.nameB.length),dv=new DataView(cd.buffer);
    dv.setUint32(0,0x02014b50,true);dv.setUint16(4,20,true);dv.setUint16(6,20,true);
    dv.setUint16(8,0,true);dv.setUint16(10,0,true);dv.setUint16(12,0,true);dv.setUint16(14,0,true);
    dv.setUint32(16,e.crc,true);dv.setUint32(20,e.dataB.length,true);dv.setUint32(24,e.dataB.length,true);
    dv.setUint16(28,e.nameB.length,true);dv.setUint16(30,0,true);dv.setUint16(32,0,true);
    dv.setUint16(34,0,true);dv.setUint16(36,0,true);dv.setUint32(38,0,true);dv.setUint32(42,e.offset,true);
    cd.set(e.nameB,46);return cd;
  });
  const cdSize=cdParts.reduce((s,p)=>s+p.length,0);
  const eocd=new Uint8Array(22),edv=new DataView(eocd.buffer);
  edv.setUint32(0,0x06054b50,true);edv.setUint16(4,0,true);edv.setUint16(6,0,true);
  edv.setUint16(8,entries.length,true);edv.setUint16(10,entries.length,true);
  edv.setUint32(12,cdSize,true);edv.setUint32(16,offset,true);edv.setUint16(20,0,true);
  const parts=[...entries.flatMap(e=>[e.lh,e.dataB]),...cdParts,eocd];
  const total=parts.reduce((s,p)=>s+p.length,0);
  const out=new Uint8Array(total);let pos=0;
  for(const p of parts){out.set(p,pos);pos+=p.length;}return out;
}
